name: Build iOS IPA

on:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Ambil kodingan terbaru dari repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # 3. Setup PHP & Composer (Untuk Laravel Tinker compiler HTML)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # 4. Copy .env and Install Composer dependencies
      - name: Install Composer Dependencies
        run: |
          cp .env.example .env
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          php artisan key:generate

      # 5. Install dependensi NPM
      - name: Install NPM Dependencies
        run: npm ci

      # 6. Compile file HTML static Laravel
      - name: Compile Laravel Blade to HTML
        run: php artisan tinker --execute="file_put_contents('public/index.html', view('welcome')->render())"

      # 7. Hapus folder ios lama, buat ulang, dan sync (menggunakan SPM bawaan)
      - name: Capacitor Sync
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          # Ganti App ID di Xcode project menjadi com.xl.MyXL.Giant-staging (karena iOS mendukung dash, tetapi Capacitor CLI melarangnya)
          sed -i '' 's/com.xl.MyXL.Giant_staging/com.xl.MyXL.Giant-staging/g' ios/App/App.xcodeproj/project.pbxproj

      # 8. Install Apple Certificate dan Provisioning Profile
      - name: Install Apple Certificate & Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Buat variabel path
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode sertifikat dan provisioning profile dari secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Buat keychain sementara
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Impor sertifikat ke keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Daftarkan Provisioning Profile di folder Xcode
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i $PP_PATH)")
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # Step Debug untuk memeriksa isi Provisioning Profile
      - name: Debug Provisioning Profile Info
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "=== PROVISIONING PROFILE DETAILS ==="
          security cms -D -i $PP_PATH > profile.plist
          echo "Profile Name:"
          /usr/libexec/PlistBuddy -c "Print Name" profile.plist || true
          echo "UUID:"
          /usr/libexec/PlistBuddy -c "Print UUID" profile.plist || true
          echo "App ID / Entitlements:"
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" profile.plist || true
          echo "Team Name:"
          /usr/libexec/PlistBuddy -c "Print TeamName" profile.plist || true
          echo "Team ID:"
          /usr/libexec/PlistBuddy -c "Print TeamIdentifier" profile.plist || true

      # 9. Buat file ExportOptions.plist untuk keperluan ekspor ke IPA
      - name: Create ExportOptions.plist
        env:
          TEAM_ID: "Q6SJUT5K5D" # Team ID dari profil MyXL-UniversalDist
          PROVISIONING_PROFILE_NAME: "MyXL-UniversalDist" # Nama profile asli
        run: |
          cat <<EOF > ios/App/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>compileBitcode</key>
              <false/>
              <key>method</key>
              <string>enterprise</string> <!-- Bisa diubah ke 'ad-hoc' atau 'app-store' or 'development' sesuai tipe profil Anda -->
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>$TEAM_ID</string> 
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.xl.MyXL.Giant-staging</key>
                  <string>$PROVISIONING_PROFILE_NAME</string> 
              </dict>
          </dict>
          </plist>
          EOF
 
      # 10. Bangun Proyek Xcode ke file Archive (.xcarchive) dengan Kode Signing Aktif
      - name: Build Xcode Project
        env:
          TEAM_ID: "Q6SJUT5K5D" # Team ID dari profil MyXL-UniversalDist
          PROVISIONING_PROFILE_NAME: "MyXL-UniversalDist" # Nama profile asli
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     DEVELOPMENT_TEAM=$TEAM_ID \
                     CODE_SIGN_STYLE=Manual \
                     PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
                     archive -archivePath ios/App/App.xcarchive

      # 11. Ekspor Archive ke file IPA menggunakan ExportOptions
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath ios/App/App.xcarchive \
                     -exportOptionsPlist ios/App/ExportOptions.plist \
                     -exportPath ios/App/build

      # 12. Upload file .ipa yang sudah di-sign ke GitHub Artifacts
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snam-portal-ios-signed-ipa
          path: ios/App/build/*.ipa
